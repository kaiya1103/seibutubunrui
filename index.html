<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>生物分類技能検定 問題集</title>

<style>

body{
    font-family:sans-serif;
    max-width:700px;
    margin:auto;
    padding:20px;
    text-align:center;
}

h1{
    color:green;
}

#question{
    font-size:22px;
    margin:30px 0;
}

.choice{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    font-size:18px;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

#nextBtn, .action-btn{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
}

</style>

<script src="question.js"></script>

</head>
<body>

<h1>生物分類技能検定</h1>

<div style="margin-bottom:20px;">

<button onclick="location.href='index.html?set=animals'">
動物
</button>

<button onclick="location.href='index.html?set=birds'">
鳥類
</button>

<button onclick="location.href='index.html?set=arthropod'">
節足動物
</button>

<button onclick="location.href='index.html?set=plants'">
植物
</button>

<button onclick="location.href='index.html?set=classification'">
植物分類
</button>

<button onclick="location.href='index.html?set=others'">
その他
</button>

</div>

<div id="quizArea">

    <div id="quizMain">
        <div id="count"></div>
        <div id="question"></div>
        <div id="choices"></div>
        <div id="result"></div>
        <button id="nextBtn" style="display:none;">次の問題</button>
    </div>

    <div id="resultArea" style="display:none;">
        <h2>終了！</h2>
        <p id="scoreText"></p>
        <div id="reviewSection"></div>
    </div>

</div>

<script>

const params = new URLSearchParams(location.search);
const setName = params.get("set") || "animals";

let quizData = questionSets[setName];

if(!quizData){
    quizData = questionSets["animals"];
}

quizData = [...quizData];

shuffle(quizData);

let current = 0;
let score = 0;
let wrongQuestions = [];

showQuestion();

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

function showQuestion(){

    document.getElementById("result").textContent = "";
    document.getElementById("nextBtn").style.display = "none";

    const q = quizData[current];

    document.getElementById("count").textContent =
        `問題 ${current+1} / ${quizData.length}`;

    document.getElementById("question").textContent =
        q.question;

    const choicesDiv =
        document.getElementById("choices");

    choicesDiv.innerHTML = "";

    q.choices.forEach((choice,index)=>{

        const btn = document.createElement("button");

        btn.className = "choice";
        btn.textContent = choice;

        btn.onclick = ()=>checkAnswer(index);

        choicesDiv.appendChild(btn);

    });
}

function checkAnswer(index){

    const q = quizData[current];

    const buttons =
        document.querySelectorAll(".choice");

    buttons.forEach(btn=>btn.disabled=true);

    if(index === q.answer){

        score++;

        document.getElementById("result").innerHTML =
        `
        〇 正解！<br>
        解説：${q.explanation}
        `;

    }else{

        document.getElementById("result").innerHTML =
        `
        × 不正解<br>
        正解：${q.choices[q.answer]}<br>
        解説：${q.explanation}
        `;

        wrongQuestions.push(q);
    }

    document.getElementById("nextBtn").style.display =
        "inline-block";
}

// 次の問題ボタンのイベント（一度登録すれば、復習モードでも共通で動きます）
document.getElementById("nextBtn").onclick = ()=>{

    current++;

    if(current >= quizData.length){
        finishQuiz();
        return;
    }

    showQuestion();
};

function finishQuiz(){
    // クイズメイン画面を隠し、終了画面を表示する
    document.getElementById("quizMain").style.display = "none";
    document.getElementById("resultArea").style.display = "block";

    // スコアの表示
    document.getElementById("scoreText").textContent = `${quizData.length}問中 ${score}問正解`;

    const reviewSection = document.getElementById("reviewSection");

    if(wrongQuestions.length > 0){
        reviewSection.innerHTML = `
            <p>間違えた問題：${wrongQuestions.length}問</p>
            <button class="action-btn" onclick="reviewWrongQuestions()">
                間違えた問題を復習
            </button>
        `;
    }else{
        reviewSection.innerHTML = `
            <p>全問正解です！</p>
        `;
    }
}

function reviewWrongQuestions(){

    quizData = [...wrongQuestions];

    shuffle(quizData);

    current = 0;
    score = 0;
    wrongQuestions = [];

    // 表示をクイズメイン画面に戻し、終了画面を隠す
    document.getElementById("quizMain").style.display = "block";
    document.getElementById("resultArea").style.display = "none";

    showQuestion();
}

</script>

</body>
</html>
